# COCO 2017 dataset http://cocodataset.org

# train and val data as 1) directory: path/images/, 2) file: path/images.txt, or 3) list: [path1/images/, path2/images/]
# path: .
# train: datasets/KITTI-yolo/train/images
# val: datasets/KITTI-yolo/val/images

origin_train: /data/mml/data_debugging_data/datasets/KITTI_8-yolo/origin/train/images
train: /data/mml/data_debugging_data/datasets/KITTI_8-yolo/train/images
val: /data/mml/data_debugging_data/datasets/KITTI_8-yolo/val/images
test: /data/mml/data_debugging_data/datasets/KITTI_8-yolo/test/images

# number of classes
nc: 8

# Classes
names:
  0: Car # 轿车
  1: Van # 厢式的运输车辆
  2: Truck # 大型的载货卡车
  3: Pedestrian # 道路上行走的人
  4: Person_sitting # 坐着的人
  5: Cyclist # 骑着自行车等两轮车辆的人
  6: Tram # 城市中的电车
  7: Misc # 其他（难以归类）

# names: [ 'Car', 'Van', 'Truck', 'Pedestrian', 'Person_sitting', 
#         'Cyclist', 'Tram', 'Misc']